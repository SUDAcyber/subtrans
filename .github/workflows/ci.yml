name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["**"] # release.yml already tests on tag pushes
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: spm-${{ runner.os }}-
      - name: Build
        run: swift build
      - name: Test
        run: swift test
